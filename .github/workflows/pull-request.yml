name: "Scheduler (Build/Test)"
on:
  pull_request:

jobs:
    api_tests:
      runs-on: ubuntu-latest
      container:
        image: gobuffalo/buffalo:v0.18.14
        ports:
          - 80
        # volumes:
        #   - my_docker_volume:/volume_mount
        # options: --cpus 1
      steps:
        - name: Checkout
          uses: actions/checkout@v4.1.1
          
        - name: Figure out where I am
          run: pwd && ls -altrh

        - name: Execute buffalo test (probably)
          run: buffalo test